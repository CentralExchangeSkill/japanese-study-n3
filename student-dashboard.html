<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - N3 Study</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: "Lexend", sans-serif; }</style>
</head>
<body class="min-h-screen bg-rose-50 text-slate-900">
  <main class="max-w-5xl mx-auto px-6 py-10">
    <div class="rounded-2xl bg-white shadow-sm p-8 border border-rose-100">
      <p class="inline-flex items-center rounded-full bg-rose-100 text-rose-700 px-3 py-1 text-sm font-semibold">Student Area</p>
      <h1 class="mt-4 text-3xl font-extrabold">Student Dashboard</h1>
      <p class="mt-2 text-slate-600">Selamat datang, Student. Lanjutkan belajar N3 sesuai progress harianmu.</p>
      <div class="mt-8 grid gap-4 sm:grid-cols-3">
        <div class="rounded-xl border border-slate-200 p-4"><p class="text-sm text-slate-500">Streak Belajar</p><p class="text-2xl font-bold">12 Hari</p></div>
        <div class="rounded-xl border border-slate-200 p-4"><p class="text-sm text-slate-500">Kosakata Selesai</p><p class="text-2xl font-bold">320</p></div>
        <div class="rounded-xl border border-slate-200 p-4"><p class="text-sm text-slate-500">Latihan Hari Ini</p><p class="text-2xl font-bold">10 Menit</p></div>
      </div>
      <a href="index.html" class="mt-8 inline-block text-rose-600 font-semibold hover:underline">← Kembali ke Login</a>
    </div>
  </main>
</body>
</html>
